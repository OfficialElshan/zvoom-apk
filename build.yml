name: Build ZVOOM APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Java qur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Node.js qur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Paketləri yüklə
        run: npm install

      - name: Capacitor Android əlavə et
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Android icazələrini ver
        run: chmod +x android/gradlew

      - name: Keystore yarat
        run: |
          keytool -genkey -v \
            -keystore zvoom.keystore \
            -alias zvoom \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass zvoom2024 \
            -keypass zvoom2024 \
            -dname "CN=ZVOOM, OU=Game, O=ZVOOM, L=Baku, S=Baku, C=AZ"
          cp zvoom.keystore android/app/zvoom.keystore

      - name: APK build et
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=zvoom.keystore \
            -Pandroid.injected.signing.store.password=zvoom2024 \
            -Pandroid.injected.signing.key.alias=zvoom \
            -Pandroid.injected.signing.key.password=zvoom2024

      - name: APK-nı yüklə
        uses: actions/upload-artifact@v4
        with:
          name: ZVOOM-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
